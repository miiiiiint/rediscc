name: Clang-Format Check

on: [push,pull_request]

jobs:
  format-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up clang-format
        run: |
          sudo apt update
          sudo apt install clang-format

      - name: Find files and format check 
        run: ./format_check.sh
