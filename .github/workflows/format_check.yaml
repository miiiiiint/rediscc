name: clang-format 格式

on:
  push:
    branches:
      - '*' # all

jobs:
  clang-format:
    runs-on: ubuntu-latest # Ubuntu 

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format # install clang-format

      - name: findfiles
        id: find_files
        run: |
          FILES=$(find . -regex '.*\.\(c\|cc\|cpp\|cxx\|h\|hpp\|hxx\|objc\|objcpp\)$' -print0 | tr '\0' ' ')
          echo "::set-output name=files::$FILES" 

      - name: use format
        run: clang-format -i --style=file ${{ steps.find_files.outputs.files }} # use .clang-format 

      - name: check changes of codes
        id: check_format
        run: |
          git diff --check || echo "::set-output name=has_changes::true" # set has_changes true

      # - name: commit
      #   if: steps.check_format.outputs.has_changes == 'true'
